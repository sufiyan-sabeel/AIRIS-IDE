<svg width="512" height="512" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AIRIS CLI logo</title>
  <desc id="desc">A professional AIRIS monogram with an orbital command path and connected intelligence nodes.</desc>
  <defs>
    <linearGradient id="airis-base" x1="12" y1="8" x2="52" y2="56" gradientUnits="userSpaceOnUse">
